<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>İzin Takip Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #03dac6; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        .log-item { background: #252525; padding: 10px; margin-top: 5px; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2>İzin Takip Sistemi</h2>
    <div class="card" id="setupCard">
        <label>İşe Giriş Tarihi:</label>
        <input type="date" id="joinDate">
        <label>Başlangıç İzin Bakiyesi:</label>
        <input type="number" id="initialBalance" value="0">
        <button onclick="saveInitial()">Kaydet</button>
    </div>

    <div class="card">
        <h3>Özet</h3>
        <p>Toplam Hak Ediş: <span id="totalRights">0</span> Gün</p>
        <p>Kullanılan: <span id="totalUsed">0</span> Gün</p>
        <p><b>Kalan: <span id="remaining">0</span> Gün</b></p>
    </div>

    <div class="card">
        <label>Başlangıç Tarihi:</label>
        <input type="date" id="start">
        <label>Kullanılan Gün:</label>
        <input type="number" id="usedDays">
        <label>Açıklama:</label>
        <input type="text" id="desc">
        <button onclick="addLeave()" style="background:#6200ee; color:white;">İzin Ekle</button>
    </div>

    <div id="logList"></div>

    <script>
        let data = JSON.parse(localStorage.getItem('izinData')) || { joinDate: null, initialBalance: 0, lastUpdateYear: null, leaves: [] };

        function calculateAutoHakedis() {
            if (!data.joinDate) return;
            const join = new Date(data.joinDate);
            const now = new Date();
            let yearsDiff = now.getFullYear() - join.getFullYear();
            
            // Yıl dönümü henüz gelmediyse bir önceki yılı baz al
            if (now < new Date(now.getFullYear(), join.getMonth(), join.getDate())) yearsDiff--;

            if (yearsDiff > 0 && (data.lastUpdateYear !== now.getFullYear())) {
                let yeniHak = 0;
                for (let i = 1; i <= yearsDiff; i++) {
                    if (i <= 5) yeniHak += 14;
                    else if (i <= 15) yeniHak += 20;
                    else yeniHak += 26;
                }
                data.initialBalance = yeniHak; 
                data.lastUpdateYear = now.getFullYear();
                localStorage.setItem('izinData', JSON.stringify(data));
            }
        }

        function updateUI() {
            if(!data.joinDate) return;
            calculateAutoHakedis();
            let used = data.leaves.reduce((sum, l) => sum + parseInt(l.days), 0);
            document.getElementById('totalRights').innerText = data.initialBalance;
            document.getElementById('totalUsed').innerText = used;
            document.getElementById('remaining').innerText = data.initialBalance - used;
            
            document.getElementById('logList').innerHTML = data.leaves.map(l => 
                `<div class="log-item">${l.start}: ${l.days} gün - ${l.desc}</div>`).join('');
        }

        function saveInitial() {
            data.joinDate = document.getElementById('joinDate').value;
            data.initialBalance = parseInt(document.getElementById('initialBalance').value);
            data.lastUpdateYear = new Date().getFullYear();
            localStorage.setItem('izinData', JSON.stringify(data));
            updateUI();
        }

        function addLeave() {
            data.leaves.push({start: document.getElementById('start').value, days: document.getElementById('usedDays').value, desc: document.getElementById('desc').value});
            localStorage.setItem('izinData', JSON.stringify(data));
            updateUI();
        }

        window.onload = () => {
            if(data.joinDate) {
                document.getElementById('joinDate').value = data.joinDate;
                document.getElementById('initialBalance').value = data.initialBalance;
                updateUI();
            }
        };
    </script>
    <script src="sw.js"></script>
</body>
</html>
