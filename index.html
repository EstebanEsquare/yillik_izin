<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>İzin Takip Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; background: #03dac6; font-weight: bold; }
        .edit-btn { background: #6200ee !important; color: white; }
    </style>
</head>
<body>
    <h2>İzin Takip Sistemi</h2>
    
    <div class="card">
        <label>İşe Giriş Tarihi:</label>
        <input type="date" id="joinDate" disabled>
        <label>Başlangıç Yıllık İzin Bakiyesi:</label>
        <input type="number" id="yillikBakiye" disabled>
        <button id="mainBtn" onclick="toggleMode()">Kaydet</button>
    </div>

    <div class="card">
        <p>Yıllık İzin: <span id="yKalan">0</span> gün</p>
        <p>Mazeret İzni (5): <span id="mKalan">5</span> gün</p>
    </div>

    <script>
        let isEditing = false;
        let data = JSON.parse(localStorage.getItem('izinData')) || { 
            joinDate: '', yillikBakiye: 0, lastYear: new Date().getFullYear(), leaves: [] 
        };

        function toggleMode() {
            const btn = document.getElementById('mainBtn');
            const inputs = [document.getElementById('joinDate'), document.getElementById('yillikBakiye')];
            
            if (!isEditing) {
                // Düzenleme Moduna Geç
                inputs.forEach(i => i.disabled = false);
                btn.innerText = "Kaydet";
                btn.className = "";
                isEditing = true;
            } else {
                // Kaydet ve Kilitli Moda Geç
                data.joinDate = document.getElementById('joinDate').value;
                data.yillikBakiye = parseInt(document.getElementById('yillikBakiye').value) || 0;
                localStorage.setItem('izinData', JSON.stringify(data));
                
                inputs.forEach(i => i.disabled = true);
                btn.innerText = "Düzenle";
                btn.className = "edit-btn";
                isEditing = false;
            }
        }

        // Uygulama açılış kontrolü
        window.onload = () => {
            if (!data.joinDate) {
                // İlk defa açılış: Düzenleme modunda başla
                toggleMode(); 
            } else {
                // Veri varsa: Kilitli modda başla
                document.getElementById('joinDate').value = data.joinDate;
                document.getElementById('yillikBakiye').value = data.yillikBakiye;
                document.getElementById('mainBtn').innerText = "Düzenle";
                document.getElementById('mainBtn').className = "edit-btn";
            }
            // ... (diğer hesaplama fonksiyonların)
        };
    </script>
    <script src="sw.js"></script>
</body>
</html>
